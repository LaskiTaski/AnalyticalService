services:
  # --- Infrastructure ---
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: bond_user
      POSTGRES_PASSWORD: bond_pass
      POSTGRES_DB: bond_screener
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bond_user -d bond_screener"]
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # --- Application ---
  collector:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: python -m src.collector.main
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: python -m src.api.main
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

  bot:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: python -m src.bot.main
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      API_HOST: api
    depends_on:
      api:
        condition: service_started
      redis:
        condition: service_healthy
    restart: unless-stopped

  # --- Testing ---
  test:
    build:
      context: .
      dockerfile: docker/Dockerfile
    command: pytest -v --tb=short
    env_file: .env
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: bond_screener_test
      REDIS_HOST: redis
      REDIS_DB: 1
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - test

volumes:
  pgdata:
